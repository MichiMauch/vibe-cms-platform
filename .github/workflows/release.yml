name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  # Required for npm Trusted Publishing (OIDC). With this and a Trusted
  # Publisher configured at npmjs.com, no NPM_TOKEN secret is needed.
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm ci

      - name: Typecheck core
        run: npm run typecheck --workspace=@vibe-cms-platform/core --if-present

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          # --provenance attaches the Sigstore signature linking the package
          # back to this exact GitHub Action run. Required when using OIDC.
          publish: npm publish --workspace=packages/core --access public --provenance
          commit: "chore: release @vibe-cms-platform/core"
          title: "Release @vibe-cms-platform/core"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
