name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org
          scope: "@vibe-cms-platform"

      - name: Install
        run: npm ci

      - name: Typecheck core
        run: npm run typecheck --workspace=@vibe-cms-platform/core --if-present

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          publish: npm run release
          commit: "chore: release @vibe-cms-platform/core"
          title: "Release @vibe-cms-platform/core"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
